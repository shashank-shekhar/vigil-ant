name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'docs/**'
      - 'scripts/**'
      - 'appcast.xml'
      - '.github/workflows/release.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'docs/**'
      - 'scripts/**'
      - 'appcast.xml'
      - '.github/workflows/release.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-packages:
    name: Test Swift Packages
    runs-on: macos-15
    strategy:
      matrix:
        package: [GitHubKit, CIStatusKit]
    steps:
      - uses: actions/checkout@v5

      - name: Test ${{ matrix.package }}
        run: |
          cd Packages/${{ matrix.package }}
          swift test

  build-app:
    name: Build App
    runs-on: macos-15
    needs: test-packages
    steps:
      - uses: actions/checkout@v5

      - name: Create Secrets.xcconfig
        env:
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
        run: |
          cat > Secrets.xcconfig << XCCONFIG
          GH_CLIENT_ID = ${GH_CLIENT_ID:-placeholder}
          SPARKLE_PUBLIC_KEY = ${SPARKLE_PUBLIC_KEY:-placeholder}
          XCCONFIG

      - name: Build
        run: |
          xcodebuild build \
            -project Vigilant/Vigilant.xcodeproj \
            -scheme Vigilant \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
