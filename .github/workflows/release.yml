name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Create Secrets.xcconfig
        env:
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
        run: |
          cat > Secrets.xcconfig << XCCONFIG
          GH_CLIENT_ID = ${GH_CLIENT_ID:-placeholder}
          SPARKLE_PUBLIC_KEY = ${SPARKLE_PUBLIC_KEY:-placeholder}
          XCCONFIG

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          # Add keychain to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release archive
        run: |
          xcodebuild archive \
            -project Vigilant/Vigilant.xcodeproj \
            -scheme Vigilant \
            -destination 'platform=macOS' \
            -archivePath build/Vigil-ant.xcarchive \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}

      - name: Export app from archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > build/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/Vigil-ant.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Package app as zip
        run: |
          cd build/export
          APP_NAME=$(ls -d *.app | head -1)
          ditto -c -k --keepParent "$APP_NAME" "../Vigil-ant-${{ steps.version.outputs.version }}.zip"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          xcrun notarytool submit "build/Vigil-ant-${VERSION}.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --wait --timeout 30m

          # Staple the notarization ticket to the app
          APP_NAME=$(ls -d build/export/*.app | head -1)
          xcrun stapler staple "$APP_NAME"

      - name: Repackage after notarization
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Repackage zip with stapled app
          rm "build/Vigil-ant-${VERSION}.zip"
          cd build/export
          APP_NAME=$(ls -d *.app | head -1)
          ditto -c -k --keepParent "$APP_NAME" "../Vigil-ant-${VERSION}.zip"

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p build/dmg
          cp -R build/export/*.app build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname "Vigil-ant" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            "build/Vigil-ant-${VERSION}.dmg"
          rm -rf build/dmg

          # Notarize and staple the DMG
          xcrun notarytool submit "build/Vigil-ant-${VERSION}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --wait --timeout 30m
          xcrun stapler staple "build/Vigil-ant-${VERSION}.dmg"

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      - name: Sign update for Sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Find Sparkle's sign_update tool from the resolved SPM package
          SIGN_UPDATE=$(find ~/Library/Developer/Xcode/DerivedData \
            -path "*/Sparkle/bin/sign_update" -type f 2>/dev/null | head -1)

          if [ -z "$SIGN_UPDATE" ]; then
            echo "Error: sign_update not found — cannot sign update for Sparkle"
            exit 1
          fi

          ZIP_FILE="build/Vigil-ant-${VERSION}.zip"
          SIGNATURE=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" "$ZIP_FILE" --ed-key-file -)
          echo "signature=${SIGNATURE}" >> "$GITHUB_OUTPUT"
        id: sparkle

      - name: Update appcast.xml
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SIGNATURE: ${{ steps.sparkle.outputs.signature }}
        run: |
          ZIP_FILE="build/Vigil-ant-${VERSION}.zip"
          FILE_SIZE=$(stat -f%z "$ZIP_FILE")
          PUB_DATE=$(date -R)
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/Vigil-ant-${VERSION}.zip"

          # Insert new item before </channel> using awk (sed can't handle multiline on macOS)
          awk -v ver="$VERSION" -v pub="$PUB_DATE" -v url="$DOWNLOAD_URL" \
              -v size="$FILE_SIZE" -v sig="$SIGNATURE" \
              '/<\/channel>/ {
                print "        <item>"
                print "            <title>Version " ver "</title>"
                print "            <pubDate>" pub "</pubDate>"
                print "            <sparkle:version>" ver "</sparkle:version>"
                print "            <sparkle:shortVersionString>" ver "</sparkle:shortVersionString>"
                print "            <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>"
                print "            <enclosure"
                print "                url=\"" url "\""
                print "                length=\"" size "\""
                print "                type=\"application/octet-stream\""
                print "                sparkle:edSignature=\"" sig "\" />"
                print "        </item>"
              } {print}' appcast.xml > appcast_tmp.xml
          mv appcast_tmp.xml appcast.xml

      - name: Commit appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add appcast.xml
          git commit -m "release: update appcast for v${{ steps.version.outputs.version }}" || true
          git push origin main

      - name: Generate checksums
        id: checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_SHA=$(shasum -a 256 "build/Vigil-ant-${VERSION}.zip" | awk '{print $1}')
          DMG_SHA=$(shasum -a 256 "build/Vigil-ant-${VERSION}.dmg" | awk '{print $1}')
          echo "zip_sha=${ZIP_SHA}" >> "$GITHUB_OUTPUT"
          echo "dmg_sha=${DMG_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
          ZIP_SHA: ${{ steps.checksums.outputs.zip_sha }}
          DMG_SHA: ${{ steps.checksums.outputs.dmg_sha }}
        run: |
          # Generate notes via API, then append checksums
          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="$TAG_NAME" --jq '.body')

          BODY=$(cat << EOF
          ${NOTES}

          ## SHA-256 Checksums
          \`\`\`
          ${ZIP_SHA}  Vigil-ant-${VERSION}.zip
          ${DMG_SHA}  Vigil-ant-${VERSION}.dmg
          \`\`\`
          EOF
          )

          gh release create "$TAG_NAME" \
            "build/Vigil-ant-${VERSION}.zip" \
            "build/Vigil-ant-${VERSION}.dmg" \
            --title "Vigil-ant ${VERSION}" \
            --notes "$BODY"

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          DMG_SHA: ${{ steps.checksums.outputs.dmg_sha }}
        run: |
          CASK_FILE="Casks/vigil-ant.rb"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/shashank-shekhar/homebrew-vigil-ant.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" "$CASK_FILE"
          sed -i '' "s/sha256 \".*\"/sha256 \"${DMG_SHA}\"/" "$CASK_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CASK_FILE"
          git commit -m "bump vigil-ant to ${VERSION}"
          git push
